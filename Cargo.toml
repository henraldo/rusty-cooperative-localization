[package]
name = "rusty-cooperative-localization"
version = "0.1.0"
edition = "2021"
authors = ["Henry <your-email>"]
description = "Rust port of UAV-UGV cooperative localization (EKF vs UKF)"
license = "MIT"

[dependencies]
nalgebra = { version = "0.34.1", features = ["serde", "rand"] }  # Linear algebra (replaces Eigen)
nalgebra-lapack = "0.27.0"                                      # For Cholesky / matrix ops UKF needs
rand = "0.8"                                                  # Gaussian noise
rand_distr = "0.4"                                            # Normal distributions
csv = "1.3"                                                   # Output like your C++ sim
serde = { version = "1.0", features = ["derive"] }            # Config serialization
chrono = "0.4"                                                # Timestamps for output dirs
ode_solvers = "0.6"                                           # Runge-Kutta DOPRI5 equivalent to Boost Odeint